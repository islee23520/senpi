name: Task 11 Benchmarks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  benchmark:
    name: PR530 benchmark gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect benchmark scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > /tmp/task-11-changed-files.txt
          suites=()
          add_suite() {
            local suite="$1"
            for existing in "${suites[@]}"; do
              if [ "$existing" = "$suite" ]; then
                return
              fi
            done
            suites+=("$suite")
          }

          if grep -Eq '^(bench/|scripts/run-pr530-benchmarks\.mjs$|package\.json$|package-lock\.json$|tsconfig|vitest)' /tmp/task-11-changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "suites=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eq '^packages/ai/(src/|test/|bench/|package\.json$|tsconfig)' /tmp/task-11-changed-files.txt; then
            add_suite "ai-event-stream"
            add_suite "ai-model-registry"
          fi
          if grep -Eq '^packages/tui/(src/|test/|bench/|package\.json$|tsconfig)' /tmp/task-11-changed-files.txt; then
            add_suite "tui-editor"
            add_suite "tui-markdown"
          fi
          if grep -Eq '^packages/coding-agent/(src/|test/|bench/|examples/|package\.json$|tsconfig)' /tmp/task-11-changed-files.txt; then
            add_suite "coding-agent-render-transcript"
            add_suite "coding-agent-bash-output"
            add_suite "coding-agent-jsonl-parse"
            add_suite "coding-agent-rpc-event-emit"
            add_suite "emit-context-clone"
            add_suite "compaction-trim"
            add_suite "word-diff"
          fi

          if [ "${#suites[@]}" -gt 0 ]; then
            suite_list="$(IFS=,; echo "${suites[*]}")"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "suites=${suite_list}" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Task 11 benchmark gate"
              echo
              echo "Skipped: this PR does not change runtime, benchmark, dependency, or TypeScript config files."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Node.js
        if: steps.scope.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: npm

      - name: Install system dependencies
        if: steps.scope.outputs.run == 'true'
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        if: steps.scope.outputs.run == 'true'
        run: npm ci --ignore-scripts

      - name: Check
        if: steps.scope.outputs.run == 'true'
        run: npm run check

      - name: Run same-run benchmark gate
        if: steps.scope.outputs.run == 'true'
        id: benchmark
        shell: bash
        run: |
          mkdir -p /tmp/task-11-bench
          benchmark_suites="${{ steps.scope.outputs.suites }}"

          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="origin/main"
          fi

          git worktree add /tmp/senpi-base "$base_ref"
          (
            cd /tmp/senpi-base
            npm ci --ignore-scripts
            node scripts/run-pr530-benchmarks.mjs \
              --suite "$benchmark_suites" \
              --iterations 30 \
              --json /tmp/task-11-bench/base.json
          )

          node scripts/run-pr530-benchmarks.mjs \
            --suite "$benchmark_suites" \
            --iterations 30 \
            --json /tmp/task-11-bench/head.json

          node <<'NODE'
          const fs = require("node:fs");
          const NOISE_TOLERANCE_PCT = 5;
          const NOISE_TOLERANCE_MS = 0.01;
          const base = JSON.parse(fs.readFileSync("/tmp/task-11-bench/base.json", "utf8"));
          const head = JSON.parse(fs.readFileSync("/tmp/task-11-bench/head.json", "utf8"));
          const baseBySuite = new Map(base.results.map((result) => [result.suite, result]));
          const failures = [];
          const newSuites = [];
          const rows = head.results.map((result) => {
            const baseline = baseBySuite.get(result.suite);
            if (!baseline) {
              newSuites.push(result.suite);
              return { suite: result.suite, status: "new-suite" };
            }
            const medianImprovementPct = ((baseline.medianMs - result.medianMs) / baseline.medianMs) * 100;
            const p95ImprovementPct = ((baseline.p95Ms - result.p95Ms) / baseline.p95Ms) * 100;
            const medianRegressionMs = result.medianMs - baseline.medianMs;
            if (medianImprovementPct < -NOISE_TOLERANCE_PCT && medianRegressionMs > NOISE_TOLERANCE_MS) {
              failures.push(
                `${result.suite} median regression ${(-medianImprovementPct).toFixed(2)}% > ${NOISE_TOLERANCE_PCT}% and ${medianRegressionMs.toFixed(6)}ms > ${NOISE_TOLERANCE_MS}ms`,
              );
            }
            return {
              suite: result.suite,
              status: "compared",
              baseMedianMs: baseline.medianMs,
              headMedianMs: result.medianMs,
              medianImprovementPct,
              baseP95Ms: baseline.p95Ms,
              headP95Ms: result.p95Ms,
              p95ImprovementPct,
            };
          });
          fs.writeFileSync(
            "/tmp/task-11-bench/comparison.json",
            `${JSON.stringify(
              {
                createdAt: new Date().toISOString(),
                noiseTolerancePct: NOISE_TOLERANCE_PCT,
                noiseToleranceMs: NOISE_TOLERANCE_MS,
                failures,
                newSuites,
                rows,
              },
              null,
              2,
            )}\n`,
          );
          if (failures.length > 0) {
            console.error(failures.join("\n"));
            process.exit(1);
          }
          NODE

          set +e
          node scripts/run-pr530-benchmarks.mjs \
            --suite "$benchmark_suites" \
            --iterations 30 \
            --baseline bench/baseline/all-baseline.json \
            --allow-regression-pct 0 \
            --json bench/IMPROVEMENTS.json \
            > /tmp/task-11-bench/static-baseline.stdout \
            2> /tmp/task-11-bench/static-baseline.stderr
          static_status=$?
          set -e
          printf 'static_status=%s\n' "$static_status" | tee /tmp/task-11-bench/static-baseline.status

          if [ -f bench/IMPROVEMENTS.json ]; then
            cp bench/IMPROVEMENTS.json /tmp/task-11-bench/IMPROVEMENTS.json
          fi

          {
            echo "## Task 11 benchmark gate"
            echo
            echo "- same-run status: pass"
            echo "- suites: ${benchmark_suites}"
            echo "- same-run median regression tolerance: 5%"
            echo "- same-run absolute median regression tolerance: 0.01ms"
            echo "- static baseline status: ${static_status}"
            echo "- runner: $(uname -a)"
            echo "- node: $(node --version)"
            echo
            echo "### Same-run comparison"
            echo
            node <<'NODE'
          const fs = require("node:fs");
          const comparison = JSON.parse(fs.readFileSync("/tmp/task-11-bench/comparison.json", "utf8"));
          console.log("| Suite | Median improvement | P95 improvement |");
          console.log("| --- | ---: | ---: |");
          for (const row of comparison.rows) {
            if (row.status === "new-suite") {
              console.log(`| ${row.suite} | new suite | new suite |`);
            } else {
              console.log(`| ${row.suite} | ${row.medianImprovementPct.toFixed(2)}% | ${row.p95ImprovementPct.toFixed(2)}% |`);
            }
          }
          NODE
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run static baseline diagnostic
        if: failure() && steps.scope.outputs.run == 'true'
        shell: bash
        run: |
          cat /tmp/task-11-bench/comparison.json
          cat /tmp/task-11-bench/static-baseline.stderr 2>/dev/null || true

      - name: Upload benchmark artifacts
        if: always() && steps.scope.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: task-11-benchmarks
          path: /tmp/task-11-bench
          if-no-files-found: warn
