name: Task 11 Benchmarks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  benchmark:
    name: PR530 benchmark gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check
        run: npm run check

      - name: Run same-run benchmark gate
        id: benchmark
        shell: bash
        run: |
          mkdir -p /tmp/task-11-bench

          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="origin/main"
          fi

          git worktree add /tmp/senpi-base "$base_ref"
          (
            cd /tmp/senpi-base
            npm ci --ignore-scripts
            node scripts/run-pr530-benchmarks.mjs \
              --suite all \
              --iterations 30 \
              --json /tmp/task-11-bench/base.json
          )

          node scripts/run-pr530-benchmarks.mjs \
            --suite all \
            --iterations 30 \
            --json /tmp/task-11-bench/head.json

          node <<'NODE'
          const fs = require("node:fs");
          const base = JSON.parse(fs.readFileSync("/tmp/task-11-bench/base.json", "utf8"));
          const head = JSON.parse(fs.readFileSync("/tmp/task-11-bench/head.json", "utf8"));
          const baseBySuite = new Map(base.results.map((result) => [result.suite, result]));
          const failures = [];
          const rows = head.results.map((result) => {
            const baseline = baseBySuite.get(result.suite);
            if (!baseline) {
              failures.push(`Missing base benchmark for ${result.suite}`);
              return { suite: result.suite, error: "missing base benchmark" };
            }
            const medianImprovementPct = ((baseline.medianMs - result.medianMs) / baseline.medianMs) * 100;
            const p95ImprovementPct = ((baseline.p95Ms - result.p95Ms) / baseline.p95Ms) * 100;
            if (medianImprovementPct < 0) {
              failures.push(`${result.suite} median regression ${(-medianImprovementPct).toFixed(2)}%`);
            }
            return {
              suite: result.suite,
              baseMedianMs: baseline.medianMs,
              headMedianMs: result.medianMs,
              medianImprovementPct,
              baseP95Ms: baseline.p95Ms,
              headP95Ms: result.p95Ms,
              p95ImprovementPct,
            };
          });
          fs.writeFileSync(
            "/tmp/task-11-bench/comparison.json",
            `${JSON.stringify({ createdAt: new Date().toISOString(), failures, rows }, null, 2)}\n`,
          );
          if (failures.length > 0) {
            console.error(failures.join("\n"));
            process.exit(1);
          }
          NODE

          set +e
          node scripts/run-pr530-benchmarks.mjs \
            --suite all \
            --iterations 30 \
            --baseline bench/baseline/all-baseline.json \
            --allow-regression-pct 0 \
            --json bench/IMPROVEMENTS.json \
            > /tmp/task-11-bench/static-baseline.stdout \
            2> /tmp/task-11-bench/static-baseline.stderr
          static_status=$?
          set -e
          printf 'static_status=%s\n' "$static_status" | tee /tmp/task-11-bench/static-baseline.status

          if [ -f bench/IMPROVEMENTS.json ]; then
            cp bench/IMPROVEMENTS.json /tmp/task-11-bench/IMPROVEMENTS.json
          fi

          {
            echo "## Task 11 benchmark gate"
            echo
            echo "- same-run status: pass"
            echo "- static baseline status: ${static_status}"
            echo "- runner: $(uname -a)"
            echo "- node: $(node --version)"
            echo
            echo "### Same-run comparison"
            echo
            node <<'NODE'
          const fs = require("node:fs");
          const comparison = JSON.parse(fs.readFileSync("/tmp/task-11-bench/comparison.json", "utf8"));
          console.log("| Suite | Median improvement | P95 improvement |");
          console.log("| --- | ---: | ---: |");
          for (const row of comparison.rows) {
            console.log(`| ${row.suite} | ${row.medianImprovementPct.toFixed(2)}% | ${row.p95ImprovementPct.toFixed(2)}% |`);
          }
          NODE
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run static baseline diagnostic
        if: failure()
        shell: bash
        run: |
          cat /tmp/task-11-bench/comparison.json
          cat /tmp/task-11-bench/static-baseline.stderr 2>/dev/null || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-11-benchmarks
          path: /tmp/task-11-bench
          if-no-files-found: warn
